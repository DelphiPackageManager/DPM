min dpm client version: 1.0.0
packageKind: git
metadata:
  id: Test.GitLib
  version: 0.1.0-beta
  description: Source-only git library that generates its package projects on install
  authors:
    - Jane Developer
  projectUrl: https://example.com/gitlib
  repositoryUrl: https://example.com/gitlib.git
  repositoryType: git
  license: MIT
targetPlatforms:
  - compiler from: delphi11.0
    compiler to: delphi13.0
    platforms: [Win32, Win64]
    template: default
templates:
  - name: default
    source:
      - src: ./*.pas
    package definitions:
      - project: ./packages/GitLibR.dproj
        requires:
          - rtl
        files:
          - ./*.pas
