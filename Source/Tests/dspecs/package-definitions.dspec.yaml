min dpm client version: 1.0.0
metadata:
  id: Test.PackageDefs
  version: 2.0.0
  description: Exercises package definitions generation
  authors:
    - Vincent Parrett
  license: Apache-2.0
targetPlatforms:
  - compiler: 12.0
    platforms: [Win32, Win64]
    template: default
templates:
  - name: default
    source:
      - src: .\src\*.pas
        dest: src
    package definitions:
      # explicit runtime, platform override, exclude with multiple masks
      - project: .\packages\FooR.dproj
        kind: runtime
        requires:
          - vcl
        files:
          - .\src\*.pas
        exclude:
          - "*.Tests.pas"
          - Internal*.pas
        platforms: [Win32, Win64]
      # explicit design, wraps the runtime sibling, single platform
      - project: .\packages\FooD.dproj
        kind: design
        requires:
          - FooR
          - designide
        files:
          - .\design\*.pas
          - .\design\*.dfm
        platforms: [Win32]
      # no kind, no platform override - kind inferred design via designide in requires
      - project: .\packages\BarInferred.dproj
        requires:
          - designide
          - FooR
        files:
          - .\bar\*.pas
      # no kind, no designide - kind inferred runtime
      - project: .\packages\BazRuntime.dproj
        requires:
          - rtl
        files:
          - .\baz\*.pas
